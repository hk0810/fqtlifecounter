<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FQT人生○○日目カウンター</title>

<!-- 読みやすい日本語フォント（Noto Sans JP）を読み込み -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
  /* ===== 基本設定 ===== */
  :root{
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --blue-light: #eaf1ff;
    --blue-pale: #f5f8ff;
    --text-main: #1f2937;
    --text-sub: #6b7280;
    --border: #e5e7eb;
    --radius: 18px;
    --shadow: 0 10px 30px rgba(37, 99, 235, 0.10), 0 2px 8px rgba(0,0,0,0.04);
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background: #ffffff;
    font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
    line-height: 1.6;
  }

  .app{
    width: 100%;
    max-width: 440px;
  }

  /* ===== タイトル ===== */
  .title-block{
    text-align: center;
    margin-bottom: 28px;
  }
  .title-block .eyebrow{
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--blue);
    background: var(--blue-light);
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .title-block h1{
    font-size: 22px;
    font-weight: 900;
    margin: 0;
    letter-spacing: 0.02em;
  }

  /* ===== カード共通 ===== */
  .card{
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 20px;
    margin-bottom: 18px;
  }

  /* ===== 入力欄 ===== */
  label{
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 6px;
  }
  .field{
    margin-bottom: 18px;
  }
  .field:last-child{ margin-bottom: 0; }

  input[type="date"],
  input[type="number"]{
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--blue-pale);
    color: var(--text-main);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  input[type="date"]:focus,
  input[type="number"]:focus{
    border-color: var(--blue);
    box-shadow: 0 0 0 4px var(--blue-light);
  }

  /* ===== ターゲット候補ボタン ===== */
  .presets{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .preset-btn{
    flex: 1 1 calc(33.333% - 6px);
    min-width: 78px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue-dark);
    background: var(--blue-light);
    border: none;
    border-radius: 10px;
    padding: 9px 4px;
    cursor: pointer;
    transition: background .15s ease, transform .1s ease;
  }
  .preset-btn:hover{ background: #dce8ff; }
  .preset-btn:active{ transform: scale(0.96); }
  .preset-btn.active{
    background: var(--blue);
    color: #fff;
  }

  /* ===== 計算ボタン ===== */
  .calc-btn{
    width: 100%;
    font-family: inherit;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(37,99,235,0.25);
    transition: background .15s ease, transform .1s ease;
  }
  .calc-btn:hover{ background: var(--blue-dark); }
  .calc-btn:active{ transform: scale(0.98); }

  /* ===== エラーメッセージ ===== */
  .error-msg{
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    font-size: 13px;
    font-weight: 700;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 14px;
  }
  .error-msg.show{ display: block; }

  /* ===== 結果エリア ===== */
  #result{
    display: none;
  }
  #result.show{
    display: block;
  }

  .divider{
    border: none;
    border-top: 1px dashed var(--border);
    margin: 16px 0;
  }

  .result-row{
    text-align: center;
  }
  .result-row .label{
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .result-row .big{
    font-size: 30px;
    font-weight: 900;
    color: var(--text-main);
  }
  .result-row .big .unit{
    font-size: 16px;
    font-weight: 700;
    margin-left: 2px;
  }
  .result-row .big.accent{ color: var(--blue); }

  .over-msg{
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #dc2626;
    background: #fef2f2;
    border-radius: 10px;
    padding: 8px;
  }

  .target-date{
    text-align: center;
    margin-top: 6px;
  }
  .target-date .sub{
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 700;
  }
  .target-date .date-value{
    font-size: 18px;
    font-weight: 700;
    margin-top: 2px;
  }

  /* ===== 進捗バー ===== */
  .progress-wrap{
    margin-top: 14px;
  }
  .progress-head{
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-head .p-label{
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 700;
  }
  .progress-head .p-value{
    font-size: 18px;
    font-weight: 900;
    color: var(--blue);
  }
  .progress-track{
    width: 100%;
    height: 14px;
    background: var(--blue-light);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill{
    height: 100%;
    background: linear-gradient(90deg, #60a5fa, var(--blue));
    border-radius: 999px;
    transition: width .6s ease;
  }

  /* ===== 次の記念日カード ===== */
  .milestone-card{
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--blue-pale);
    border: 1px solid var(--blue-light);
    border-radius: 14px;
    padding: 14px;
    margin-top: 4px;
  }
  .milestone-card .emoji{
    font-size: 28px;
    line-height: 1;
  }
  .milestone-card .m-text .m-title{
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 700;
  }
  .milestone-card .m-text .m-main{
    font-size: 16px;
    font-weight: 900;
    margin-top: 2px;
  }
  .milestone-card .m-text .m-main .m-accent{
    color: var(--blue);
  }

  .section-title{
    font-size: 13px;
    font-weight: 700;
    color: var(--text-sub);
    margin: 0 0 10px;
  }

  /* ===== フッターメッセージ ===== */
  .footer-message{
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue-dark);
    letter-spacing: 0.03em;
    margin: 26px 0 4px;
  }

  /* ===== 宣伝カード（FQT不思議色鉛筆の世界） ===== */
  .promo-card{
    display: block;
    text-decoration: none;
    color: inherit;
    border-color: #f0dfa0;
    background: linear-gradient(135deg, #fffdf5, #fff8e6);
    box-shadow: 0 10px 30px rgba(184, 134, 11, 0.18), 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
    animation: promo-glow 2.4s ease-in-out infinite;
    cursor: pointer;
    margin-top: 10px;
  }
  .promo-card:hover{
    border-color: #d4af37;
  }
  @keyframes promo-glow{
    0%, 100% { box-shadow: 0 10px 30px rgba(184, 134, 11, 0.18), 0 2px 8px rgba(0,0,0,0.04); }
    50%      { box-shadow: 0 10px 34px rgba(184, 134, 11, 0.34), 0 2px 10px rgba(0,0,0,0.05); }
  }
  .promo-inner{
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .promo-emoji{
    font-size: 30px;
    line-height: 1;
    flex-shrink: 0;
  }
  .promo-text{
    flex: 1;
    min-width: 0;
  }
  .promo-sub{
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 2px;
  }
  .promo-main{
    font-size: 20px;
    font-weight: 900;
    color: #b8860b;
  }
  .promo-arrow{
    font-size: 26px;
    font-weight: 900;
    color: #d4af37;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app">

  <!-- タイトル -->
  <div class="title-block">
    <span class="eyebrow">LIFE DAYS COUNTER</span>
    <h1>FQT人生○○日目カウンター</h1>
  </div>

  <!-- 入力カード -->
  <div class="card">
    <div class="field">
      <label for="birthdate">① 生年月日</label>
      <input type="date" id="birthdate" required>
    </div>

    <div class="field">
      <label for="targetDays">② ターゲット日数</label>
      <input type="number" id="targetDays" min="1" step="1" value="10000" required>

      <!-- ターゲット日数候補ボタン -->
      <div class="presets" id="presets"></div>
    </div>

    <div class="field" style="margin-top: 22px;">
      <button class="calc-btn" id="calcBtn">計算する</button>
    </div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 結果カード -->
  <div class="card" id="result">

    <div class="result-row">
      <div class="label">現在　あなたは</div>
      <div class="big accent"><span id="currentDay">-</span><span class="unit">日目</span></div>
    </div>

    <hr class="divider">

    <div class="result-row">
      <div class="label" id="targetLabel">ターゲット　○○日目まで</div>
      <div class="big">あと　<span id="remainDays">-</span><span class="unit">日</span></div>
      <div class="over-msg" id="overMsg"></div>
    </div>

    <hr class="divider">

    <div class="target-date">
      <div class="sub" id="targetDaySub">○○日目</div>
      <div class="date-value" id="targetDateValue">-</div>
    </div>

    <hr class="divider">

    <div class="progress-wrap">
      <div class="progress-head">
        <span class="p-label" id="progressLabel">○○日目までの進捗率</span>
        <span class="p-value" id="progressValue">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 次の人生の節目カード -->
  <div class="card" id="milestoneCard" style="display:none;">
    <p class="section-title">🎯 次に訪れる人生の節目</p>
    <div class="milestone-card">
      <div class="emoji" id="milestoneEmoji">🎉</div>
      <div class="m-text">
        <div class="m-title" id="milestoneTitle">-</div>
        <div class="m-main">あと <span class="m-accent" id="milestoneDays">-</span> 日</div>
      </div>
    </div>
  </div>

  <!-- フッターメッセージ -->
  <p class="footer-message">今日という日は、残りの人生の最初の日。</p>

  <!-- 不思議色鉛筆の世界へのリンク -->
  <a class="card promo-card" href="https://fushigi-pencils-jtwi4o4.gamma.site/" target="_blank" rel="noopener noreferrer">
    <p class="section-title">✏️ もっと不思議な世界へ</p>
    <div class="promo-inner">
      <div class="promo-emoji">🎨</div>
      <div class="promo-text">
        <div class="promo-sub">今すぐ体験してみる</div>
        <div class="promo-main">FQT不思議色鉛筆の世界</div>
      </div>
      <div class="promo-arrow">›</div>
    </div>
  </a>

</div>

<script>
/* ==========================================================
   FQT人生○○日目カウンター
   すべての計算は「今日の日付」を基準に行う
   ========================================================== */

// ----- 要素の取得 -----
const birthdateInput = document.getElementById('birthdate');
const targetDaysInput = document.getElementById('targetDays');
const presetsWrap = document.getElementById('presets');
const calcBtn = document.getElementById('calcBtn');
const errorMsg = document.getElementById('errorMsg');
const resultBox = document.getElementById('result');
const milestoneCard = document.getElementById('milestoneCard');

// ----- ターゲット日数の候補一覧 -----
const PRESET_DAYS = [13, 130, 680, 1000, 1300, 5000, 6800, 7777, 10000, 11111, 12345, 13000, 20000, 22222, 30000, 33333];

// ----- 人生の節目一覧（日数, 絵文字, ラベル） -----
const MILESTONES = [
  { days: 100,   emoji: '🎉', label: '100日' },
  { days: 365,   emoji: '🌸', label: '365日（1歳）' },
  { days: 1000,  emoji: '🌈', label: '1,000日' },
  { days: 5000,  emoji: '⭐', label: '5,000日' },
  { days: 7777,  emoji: '✨', label: '7,777日' },
  { days: 10000, emoji: '🎊', label: '10,000日' },
  { days: 11111, emoji: '💎', label: '11,111日' },
  { days: 20000, emoji: '🚀', label: '20,000日' },
  { days: 30000, emoji: '🌍', label: '30,000日' },
];

// 今日の日付の上限をdate inputに設定（未来の誕生日を入力不可にする）
function setMaxDateToToday(){
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  birthdateInput.max = `${y}-${m}-${d}`;
}
setMaxDateToToday();

// ----- ターゲット候補ボタンを生成 -----
function renderPresetButtons(){
  presetsWrap.innerHTML = '';
  PRESET_DAYS.forEach(days => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'preset-btn';
    btn.textContent = days.toLocaleString('ja-JP') + '日';
    btn.dataset.days = days;
    btn.addEventListener('click', () => {
      targetDaysInput.value = days;
      highlightActivePreset(days);
    });
    presetsWrap.appendChild(btn);
  });
}
renderPresetButtons();

// 選択中の候補ボタンをハイライト
function highlightActivePreset(days){
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.days) === Number(days));
  });
}

// ----- 日付をYYYY年M月D日形式にフォーマット -----
function formatDateJP(date){
  return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
}

// ----- 2つの日付の日数差を計算（時差の影響を避けるためUTC正午基準で計算） -----
function diffDays(dateA, dateB){
  const a = Date.UTC(dateA.getFullYear(), dateA.getMonth(), dateA.getDate());
  const b = Date.UTC(dateB.getFullYear(), dateB.getMonth(), dateB.getDate());
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
}

// ----- エラー表示・非表示 -----
function showError(message){
  errorMsg.textContent = message;
  errorMsg.classList.add('show');
  resultBox.classList.remove('show');
  milestoneCard.style.display = 'none';
}
function hideError(){
  errorMsg.classList.remove('show');
  errorMsg.textContent = '';
}

// ----- メインの計算処理 -----
function calculate(){
  hideError();

  const birthValue = birthdateInput.value;
  const targetValue = targetDaysInput.value;

  // 未入力チェック
  if (!birthValue){
    showError('生年月日を入力してください。');
    return;
  }
  if (!targetValue || Number(targetValue) <= 0){
    showError('ターゲット日数を正しく入力してください。');
    return;
  }

  const birthDate = new Date(birthValue + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // 未来の誕生日チェック
  if (birthDate.getTime() > today.getTime()){
    showError('未来の日付は生年月日として入力できません。');
    return;
  }

  const targetDays = Math.floor(Number(targetValue));

  // 生まれてから今日までの日数（誕生日を1日目とする）
  const currentDay = diffDays(birthDate, today) + 1;

  // ターゲット到達日 = 誕生日 + (targetDays - 1)
  const targetDate = new Date(birthDate);
  targetDate.setDate(targetDate.getDate() + (targetDays - 1));

  // 残り日数（マイナスなら超過）
  const remain = targetDays - currentDay;

  // 進捗率
  const progress = Math.max(0, Math.min(999, (currentDay / targetDays) * 100));

  renderResult({ currentDay, targetDays, targetDate, remain, progress });
  renderNextMilestone(currentDay);
}

// ----- 結果を画面に描画 -----
function renderResult({ currentDay, targetDays, targetDate, remain, progress }){
  document.getElementById('currentDay').textContent = currentDay.toLocaleString('ja-JP');

  const targetDaysLabel = targetDays.toLocaleString('ja-JP');
  document.getElementById('targetLabel').textContent = `ターゲット　${targetDaysLabel}日目まで`;
  document.getElementById('targetDaySub').textContent = `${targetDaysLabel}日目`;
  document.getElementById('targetDateValue').textContent = formatDateJP(targetDate);
  document.getElementById('progressLabel').textContent = `${targetDaysLabel}日目までの進捗率`;

  const overMsg = document.getElementById('overMsg');
  const remainEl = document.getElementById('remainDays');

  if (remain >= 0){
    // まだ到達していない場合
    remainEl.textContent = remain.toLocaleString('ja-JP');
    overMsg.classList.remove('show');
    overMsg.textContent = '';
    overMsg.style.display = 'none';
  } else {
    // すでにターゲットを超えている場合
    const over = Math.abs(remain);
    remainEl.textContent = '0';
    overMsg.style.display = 'block';
    overMsg.textContent = `${over.toLocaleString('ja-JP')}日超えています`;
  }

  // 進捗バー（表示上は100%を上限にする）
  const displayProgress = Math.min(100, progress);
  document.getElementById('progressFill').style.width = displayProgress + '%';
  document.getElementById('progressValue').textContent = progress.toFixed(1) + '%';

  resultBox.classList.add('show');
}

// ----- 次に訪れる人生の節目を表示 -----
function renderNextMilestone(currentDay){
  const next = MILESTONES.find(m => m.days > currentDay);

  if (!next){
    // すべての節目を通過している場合は非表示
    milestoneCard.style.display = 'none';
    return;
  }

  const daysUntil = next.days - currentDay;
  document.getElementById('milestoneEmoji').textContent = next.emoji;
  document.getElementById('milestoneTitle').textContent = `${next.emoji} ${next.label}`;
  document.getElementById('milestoneDays').textContent = daysUntil.toLocaleString('ja-JP');

  milestoneCard.style.display = 'block';
}

// ----- イベント登録 -----
calcBtn.addEventListener('click', calculate);

// ターゲット日数を手動入力した場合は候補ボタンのハイライトを更新
targetDaysInput.addEventListener('input', () => {
  highlightActivePreset(targetDaysInput.value);
});

// 初期表示で10000日目候補をハイライト
highlightActivePreset(targetDaysInput.value);
</script>

</body>
</html>
